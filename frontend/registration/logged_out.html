<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Выход выполнен | RoadWatch Monitor</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at 10% 20%, rgb(239, 246, 255) 0%, rgb(219, 234, 254) 100%); 
            margin: 0; 
            padding: 0; 
            color: #1e293b; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { 
            width: 100%;
            max-width: 480px; 
            padding: 20px; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6); 
            border-radius: 24px; 
            padding: 48px 32px; 
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08),
                        0 0 0 1px rgba(15, 23, 42, 0.02); 
            text-align: center;
        }
        .icon-box {
            width: 64px;
            height: 64px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
            color: #16a34a;
            box-shadow: 0 4px 10px rgba(22, 163, 74, 0.05);
        }
        h1 { 
            margin-top: 0; 
            margin-bottom: 12px;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0f172a;
        }
        p { 
            font-size: 15px;
            color: #64748b; 
            line-height: 1.6;
            margin-bottom: 32px; 
            margin-top: 0;
        }
        a { 
            display: block; 
            width: 100%;
            padding: 14px; 
            border-radius: 12px; 
            text-decoration: none; 
            background: #2563eb; 
            color: #ffffff; 
            font-weight: 600; 
            font-size: 16px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        a:hover { 
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }
        a:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon-box">✓</div>
            <h1>Вы успешно вышли</h1>
            <p>Сеанс безопасности завершён. Вы можете в любой момент вернуться к интерактивной карте дорог.</p>
            <a href="/">Вернуться на карту</a>
        </div>
    </div>
</body>
</html>
